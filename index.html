<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Space</title>
    <style>
        /* 기본 스타일 리셋 및 배경 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 메인 프로필 카드 */
        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* 프로필 아바타 (이름 첫 글자 원형 아이콘) */
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            line-height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        /* 텍스트 스타일 */
        h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 30px;
        }

        /* 링크 버튼 스타일 */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            padding: 14px;
            background-color: white;
            color: #4a5568;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .link-btn:hover {
            background-color: #4a5568;
            color: white;
            border-color: #4a5568;
            transform: scale(1.02);
        }

        /* 하단 푸터 */
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">✨</div>
        
        <h1>안녕하세요, 반갑습니다!</h1>
        <p class="subtitle">(첫 웹사이트 제작 테스트) 개인 프로그래밍 공부 자료를 올리는 웹사이트입니다..</p>
        
        <div class="links-container">
            <a href="https://github.com/제아이디-eng" target="_blank" class="link-btn">📁 GitHub 저장소 방문하기</a>
            <a href="https://instagram.com" target="_blank" class="link-btn">📸 인스타그램 (링크 변경 가능)</a>
            <a href="mailto:내이메일@gmail.com" class="link-btn">✉️ 이메일 보내기</a>
        </div>

        <footer>
            © 2026 규영-eng. All rights reserved.
        </footer>
    </div>

</body>
</html>
